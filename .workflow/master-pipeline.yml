stages:
  - build
  - deploy

variables:
  NODE_VERSION: "18"

cache:
  key: ${CI_COMMIT_REF_NAME}-node
  paths:
    - node_modules/
    - dist/

build-and-test:
  stage: build
  only:
    - master
    - main
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run lint
    - npm test
    - npm run build
  artifacts:
    paths:
      - dist
      - node_modules

deploy:
  stage: deploy
  only:
    - master
    - main
  needs:
    - build-and-test
  script:
    # 使用SSH部署到服务器
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SERVER_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - ssh $SERVER_USERNAME@$SERVER_HOST "cd /root/server-projects/mengniu_server && git pull && docker-compose down && docker-compose up -d --build"

# Gitee流水线环境变量配置说明
# 请在Gitee项目设置 -> 流水线 -> 环境变量中配置以下变量:
# SERVER_HOST: 服务器IP地址
# SERVER_USERNAME: 服务器用户名
# SSH_PRIVATE_KEY: SSH私钥 