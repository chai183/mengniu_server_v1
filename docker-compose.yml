# version: '3.8'

services:
  app:
    build: .
    container_name: backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 使用host.docker.internal连接宿主机
      - DB_HOST=host.docker.internal
      # 注释掉固定IP方式
      # - DB_HOST=172.17.0.1
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=123456
      - DB_DATABASE=db_template
      # PM2配置 - 实例数量
      - PM2_INSTANCES=max
      # PM2配置 - 内存限制
      - PM2_MAX_MEMORY_RESTART=1G
    restart: always
    # 为PM2日志创建数据卷
    volumes:
      - /root/.pm2/logs:/root/.pm2/logs
      - /var/www/static:/static
    # 在Linux上启用host.docker.internal解析
    extra_hosts:
      - "host.docker.internal:host-gateway"